spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  profiles:
    active: test

server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

binance:
  url: http://localhost:${wiremock.server.port}

openfigi:
  url: http://localhost:${wiremock.server.port}
  default-exchange-code: IM

auth:
  url: http://localhost:${wiremock.server.port}

historicalPrices:
  url: http://localhost:${wiremock.server.port}

cloudflare-bypass-proxy:
  url: http://localhost:${wiremock.server.port}

vision:
  enabled: ${VISION_ENABLED:false}
  base64EncodedKey: ${VISION_BASE64_ENCODED_KEY:}

telegram:
  bot:
    enabled: ${TELEGRAM_BOT_ENABLED:false}
    token: ${TELEGRAM_BOT_TOKEN:}

trading212:
  api:
    base-url: ${TRADING212_API_BASE_URL:http://localhost:${wiremock.server.port}}
    key-id: ${TRADING212_API_KEY_ID:}
    key-secret: ${TRADING212_API_KEY_SECRET:}

trading212-scraping:
  symbols:
    - symbol: WTAI:MIL:EUR
      ticker: WTAIm_EQ
    - symbol: VUAA:GER:EUR
      ticker: VUAAm_EQ
    - symbol: SPYL:GER:EUR
      ticker: SPYLa_EQ
    - symbol: QDVE:GER:EUR
      ticker: QDVEd_EQ
    - symbol: XAIX:GER:EUR
      ticker: XAIXd_EQ
    - symbol: CSX5:AEX:EUR
      ticker: CSX5a_EQ
    - symbol: BNKE:PAR:EUR
      ticker: BNKEp_EQ
