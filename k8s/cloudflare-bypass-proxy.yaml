apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflare-bypass-proxy
  namespace: portfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflare-bypass-proxy
  template:
    metadata:
      labels:
        app: cloudflare-bypass-proxy
    spec:
      containers:
        - name: cloudflare-bypass-proxy
          image: ktenman/cloudflare-bypass-proxy:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: cloudflare-bypass-proxy
  namespace: portfolio
spec:
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: cloudflare-bypass-proxy
