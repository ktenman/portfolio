apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: portfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: ktenman/auth:latest
          ports:
            - containerPort: 8083
          env:
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: GOOGLE_CLIENT_SECRET
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: GITHUB_CLIENT_ID
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: GITHUB_CLIENT_SECRET
            - name: ALLOWED_EMAILS
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: ALLOWED_EMAILS
            - name: ALLOWED_LOGINS
              value: "ktenman"
            - name: REDIRECT_URI
              value: "https://fov.ee"
            - name: SPRING_REDIS_HOST
              value: "redis"
            - name: SERVER_PORT
              value: "8083"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "750m"

---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: portfolio
spec:
  ports:
    - port: 8083
  selector:
    app: auth
