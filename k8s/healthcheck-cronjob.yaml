apiVersion: batch/v1
kind: CronJob
metadata:
  name: healthcheck-ping
  namespace: portfolio
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: ping
              image: curlimages/curl:8.11.1
              command:
                - "/bin/sh"
                - "-c"
                - |
                  set -e
                  STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 http://backend:8080/actuator/health/readiness)
                  if [ "$STATUS" = "200" ] && [ -n "$HEALTHCHECK_URL" ]; then
                    curl -fsS --max-time 20 "$HEALTHCHECK_URL" >/dev/null && echo "pinged monitor"
                  else
                    echo "backend not ready ($STATUS) or no monitor url; skipping ping"
                  fi
              env:
                - name: HEALTHCHECK_URL
                  valueFrom:
                    secretKeyRef:
                      name: portfolio-secrets
                      key: HEALTHCHECK_URL
                      optional: true
              resources:
                requests:
                  memory: "16Mi"
                  cpu: "10m"
                limits:
                  memory: "64Mi"
                  cpu: "100m"
