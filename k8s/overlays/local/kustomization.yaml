apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: portfolio
resources:
  - ../../namespace.yaml
  - ../../postgres.yaml
  - ../../redis.yaml
  - ../../minio.yaml
  - ../../cloudflare-bypass-proxy.yaml
  - ../../backend.yaml
  - ../../frontend.yaml
  - ../../auth.yaml
  - ../../caddy-config.local.yaml
  - ../../caddy.yaml
  - ../../healthcheck-cronjob.yaml
generatorOptions:
  disableNameSuffixHash: true
secretGenerator:
  - name: portfolio-secrets
    envs:
      - ../../../.env.local
patches:
  - path: backend-patch.yaml
