name: OpenRouter Model Freshness

permissions:
  contents: read
  issues: write

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compare AiModel entries against OpenRouter catalog
        run: |
          python3 - <<'EOF'
          import json, re, urllib.request

          source = open("src/main/kotlin/ee/tenman/portfolio/domain/AiModel.kt").read()
          retired = {"anthropic/claude-sonnet-4.6", "deepseek/deepseek-v3.2", "openai/gpt-5.4", "anthropic/claude-opus-4.6"}
          active = [m for m in re.findall(r'"([\w.-]+/[\w.-]+)"', source) if m not in retired]
          if not active:
              raise SystemExit("no model ids found in AiModel.kt")

          with urllib.request.urlopen("https://openrouter.ai/api/v1/models") as response:
              catalog = {m["id"] for m in json.load(response)["data"]}

          def parse(model_id):
              tokens = re.findall(r"\d+(?:\.\d+)*", model_id)
              key = re.sub(r"\d+(?:\.\d+)*", "{v}", model_id)
              version = tuple(int(p) for t in tokens for p in t.split("."))
              return key, version

          families = {}
          for candidate in catalog:
              key, version = parse(candidate)
              families.setdefault(key, []).append((version, candidate))

          missing, outdated = [], []
          for model in active:
              if model not in catalog:
                  missing.append(model)
                  continue
              key, version = parse(model)
              newer = sorted(c for v, c in families.get(key, []) if v > version)
              if newer:
                  outdated.append((model, newer))

          lines = []
          if missing:
              lines.append("## Models no longer on OpenRouter (cascade will break)")
              lines += [f"- `{m}`" for m in missing]
          if outdated:
              lines.append("## Newer versions available")
              lines += [f"- `{m}` -> {', '.join(f'`{n}`' for n in newer)}" for m, newer in outdated]
          open("report.md", "w").write("\n".join(lines))
          print("\n".join(lines) or "All models current")
          EOF

      - name: Create or update tracking issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -s report.md ]; then exit 0; fi
          gh label create model-freshness --repo "$GITHUB_REPOSITORY" --color D93F0B --description "OpenRouter model drift" --force
          TITLE="OpenRouter models in AiModel.kt are outdated"
          NUMBER=$(gh issue list --repo "$GITHUB_REPOSITORY" --label model-freshness --state open --json number --jq '.[0].number // empty')
          if [ -n "$NUMBER" ]; then
            gh issue edit "$NUMBER" --repo "$GITHUB_REPOSITORY" --body-file report.md
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$TITLE" --label model-freshness --body-file report.md
          fi
